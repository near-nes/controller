x-simulation-base: &simulation-base
  image: simulation:latest
  build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
  volumes:
    - .:/sim/controller
  stdin_open: true
  tty: true
  environment:
    UID: ${UID}
    GID: ${GID}
    ENABLE_VNC: ${ENABLE_VNC:-false}
    TZ: ${TZ:-Europe/Rome}
    PYNEST_QUIET: 0
  # ports:
  # - "127.0.0.1:5901:5901" # (VNC display :1)
  working_dir: /sim/controller

services:
  development:
    <<: *simulation-base
    image: simulation:dev
    command: bash

  production:
    <<: *simulation-base
    image: simulation:prod
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
    command: bash

  simulation-nrp:
    <<: *simulation-base
    image: simulation:nrp
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: hpc
    command: sh -c "python /sim/controller/complete_control/nrp_start_sim.py"
    # depends_on:
    #   - nest-server
